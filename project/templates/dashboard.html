{% extends "base.html" %}

{% block content %}

<h2>🔐 File Locker</h2>

<div class="top-bar">

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button class="btn encrypt">Upload</button>
        <input type="text" id="key" name="key" placeholder="Enter key" maxlength="1">
    </form>

</div>

{% for file in files %}
<div class="file-row">

    <div class="file-name">📄 {{ file }}</div>
    <div class="file-actions">

        {% if file.endswith('.enc') %}
            <span class="status encrypted">🔒 Encrypted</span>
            <button class="btn decrypt" onclick="action('decrypt','{{ file }}')">Decrypt</button>
        {% else %}
            <span class="status normal">✅ Normal</span>
            <button class="btn encrypt" onclick="action('encrypt','{{ file }}')">Encrypt</button>
        {% endif %}

        <a href="/download/{{ file }}" class="btn download">Download</a>
        <button class="btn delete" onclick="deleteFile('{{ file }}')">Delete</button>

    </div>

</div>
{% endfor %}

<script src="{{ url_for('static', filename='script.js') }}"></script>

{% endblock %}
